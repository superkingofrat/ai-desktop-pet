<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI 小助手</title>

<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, "Segoe UI", Roboto, "Helvetica Neue", sans-serif;
  background: transparent; overflow: hidden;
  width: 100vw; height: 100vh; user-select: none;
}
#pet {
  position: fixed; bottom: 24px; right: 24px; z-index: 9999;
  cursor: pointer; display: flex; flex-direction: column; align-items: center;
  transition: transform 0.2s ease;
}
#pet:hover { transform: scale(1.08); }
#pet:active { transform: scale(0.95); }
.pet-avatar {
  width: 72px; height: 72px; border-radius: 50%;
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  display: flex; align-items: center; justify-content: center;
  font-size: 36px; color: #fff;
  box-shadow: 0 4px 20px rgba(245,87,108,0.4);
  position: relative;
  animation: breathe 3s ease-in-out infinite;
}
@keyframes breathe {
  0%, 100% { box-shadow: 0 4px 20px rgba(245,87,108,0.3); }
  50% { box-shadow: 0 6px 28px rgba(245,87,108,0.6); }
}
.status-dot {
  width: 12px; height: 12px; border-radius: 50%;
  border: 2px solid #fff; position: absolute; bottom: 0; right: 0;
  transition: background 0.3s;
}
.status-dot.connecting { background: #fbbf24; }
.status-dot.connected  { background: #34d399; }
.status-dot.disconnected { background: #f87171; }
.status-label {
  margin-top: 6px; font-size: 11px; color: rgba(255,255,255,0.75);
  text-shadow: 0 1px 4px rgba(0,0,0,0.3);
  background: rgba(0,0,0,0.35); padding: 2px 10px; border-radius: 10px;
  white-space: nowrap;
}
#chat-dialog {
  position: fixed; bottom: 110px; right: 24px; z-index: 9998;
  width: 360px; max-height: 520px;
  background: rgba(255,255,255,0.88);
  backdrop-filter: blur(16px);
  -webkit-backdrop-filter: blur(16px);
  border-radius: 20px; box-shadow: 0 8px 40px rgba(0,0,0,0.15);
  display: none; flex-direction: column; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.5);
}
#chat-dialog.open { display: flex; }
.chat-header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 18px;
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  color: #fff; cursor: grab; user-select: none;
}
.chat-header:active { cursor: grabbing; }
.chat-header-title {
  display: flex; align-items: center; gap: 8px;
  font-size: 15px; font-weight: 600;
}
.chat-header-title i { font-size: 18px; }
.chat-close {
  width: 28px; height: 28px; border-radius: 50%; border: none;
  background: rgba(255,255,255,0.2); color: #fff; font-size: 14px;
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: background 0.2s;
}
.chat-close:hover { background: rgba(255,255,255,0.35); }
.chat-body {
  flex: 1; overflow-y: auto; padding: 14px 16px;
  display: flex; flex-direction: column; gap: 10px;
  min-height: 200px; max-height: 340px; scroll-behavior: smooth;
}
.chat-body::-webkit-scrollbar { width: 4px; }
.chat-body::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 4px; }
.msg {
  max-width: 85%; padding: 10px 14px; border-radius: 16px;
  font-size: 14px; line-height: 1.55; word-wrap: break-word;
  animation: msgIn 0.25s ease;
}
@keyframes msgIn {
  from { opacity: 0; transform: translateY(6px) scale(0.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}
.msg.user {
  align-self: flex-end;
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  color: #fff; border-bottom-right-radius: 4px;
}
.msg.ai {
  align-self: flex-start;
  background: rgba(245,158,184,0.18);
  color: #374151; border-bottom-left-radius: 4px;
}
.msg.system {
  align-self: center; background: transparent;
  color: #9ca3af; font-size: 12px; padding: 4px 8px;
}
.msg.tool-call {
  align-self: flex-start; background: rgba(251,191,36,0.12);
  color: #92400e; font-size: 12px; border-radius: 10px; padding: 6px 12px;
}
.msg .thinking-text { color: #9ca3af; font-style: italic; font-size: 12px; }
.msg .stream-cursor::after {
  content: ""; display: inline-block; width: 2px; height: 14px;
  background: #f5576c; margin-left: 2px;
  animation: blink 0.8s step-end infinite; vertical-align: text-bottom;
}
@keyframes blink { 50% { opacity: 0; } }
.chat-footer {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px 14px; border-top: 1px solid rgba(0,0,0,0.06);
}
.chat-footer input {
  flex: 1; border: none; background: rgba(243,244,246,0.7);
  border-radius: 20px; padding: 10px 16px; font-size: 14px;
  outline: none; transition: background 0.2s;
}
.chat-footer input:focus { background: rgba(243,244,246,1); }
.chat-footer button {
  width: 40px; height: 40px; border-radius: 50%; border: none;
  background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
  color: #fff; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: transform 0.15s, box-shadow 0.15s; flex-shrink: 0;
}
.chat-footer button:hover { transform: scale(1.05); box-shadow: 0 2px 12px rgba(245,87,108,0.4); }
.chat-footer button:active { transform: scale(0.95); }
.chat-footer button:disabled { opacity: 0.4; cursor: not-allowed; }
@media (max-width: 480px) {
  #chat-dialog { right: 8px; bottom: 100px; width: calc(100vw - 16px); max-height: 60vh; }
  #pet { bottom: 16px; right: 16px; }
  .pet-avatar { width: 60px; height: 60px; font-size: 28px; }
}
</style>
</head>
<body>
<div id="pet" title="点击聊天">
  <div class="pet-avatar">
    🐱
    <span class="status-dot connecting" id="statusDot"></span>
  </div>
  <div class="status-label" id="statusLabel">连接中...</div>
</div>
<div id="chat-dialog">
  <div class="chat-header" id="chatHeader">
    <div class="chat-header-title">
      🐱
      <span>AI 小助手</span>
    </div>
    <button class="chat-close" id="chatClose" title="关闭对话框">✕</button>
  </div>
  <div class="chat-body" id="chatBody">
    <div class="msg system">点击猫咪开始对话吧</div>
  </div>
  <div class="chat-footer">
    <input type="text" id="chatInput" placeholder="输入消息..." autocomplete="off">
    <button id="sendBtn" title="发送">➤</button>
  </div>
</div>
<script>
(function(){'use strict';
var pet=document.getElementById('pet'),dialog=document.getElementById('chat-dialog'),
chatBody=document.getElementById('chatBody'),chatInput=document.getElementById('chatInput'),
sendBtn=document.getElementById('sendBtn'),closeBtn=document.getElementById('chatClose'),
dot=document.getElementById('statusDot'),label=document.getElementById('statusLabel'),
header=document.getElementById('chatHeader');
var ws=null,reconnectTimer=null,connected=false,dialogOpen=false,
currentAiMsg=null,streamBuffer='',isStreaming=false;
function setStatus(s){
dot.className='status-dot '+s;
var m={connecting:'连接中...',connected:'已连接',disconnected:'已断开'};
label.textContent=m[s]||s;connected=s==='connected';
if(!connected&&dialogOpen)addMsg('连接已断开，正在重连...','system');
}
function addMsg(html,c){
var d=document.createElement('div');d.className='msg '+(c||'');
d.innerHTML=html;chatBody.appendChild(d);
chatBody.scrollTop=chatBody.scrollHeight;return d;
}
function escapeHtml(s){
if(!s)return '';var d=document.createElement('div');
d.appendChild(document.createTextNode(s));return d.innerHTML;
}
function finalizeStream(){
if(isStreaming&&currentAiMsg)currentAiMsg.innerHTML=escapeHtml(streamBuffer);
isStreaming=false;currentAiMsg=null;streamBuffer='';
}
function connectWS(){
if(ws&&(ws.readyState===WebSocket.OPEN||ws.readyState===WebSocket.CONNECTING))return;
setStatus('connecting');
try{ws=new WebSocket('ws://localhost:8000/ws/chat');}catch(e){setStatus('disconnected');scheduleReconnect();return;}
ws.onopen=function(){setStatus('connected');if(reconnectTimer){clearTimeout(reconnectTimer);reconnectTimer=null;}};
ws.onclose=function(){setStatus('disconnected');ws=null;if(isStreaming)finalizeStream();scheduleReconnect();};
ws.onerror=function(){};
ws.onmessage=function(e){try{var data=JSON.parse(e.data);}catch(_){return;}
switch(data.type){
case'thinking':
if(!isStreaming){currentAiMsg=addMsg('<span class="thinking-text">⏳ 思考中...</span>','ai');streamBuffer='';isStreaming=true;}
break;
case'delta':
if(!isStreaming){currentAiMsg=addMsg('','ai');streamBuffer='';isStreaming=true;}
var c=data.content||'';streamBuffer+=c;
currentAiMsg.innerHTML=escapeHtml(streamBuffer)+'<span class="stream-cursor"></span>';
chatBody.scrollTop=chatBody.scrollHeight;break;
case'done':
if(isStreaming&&currentAiMsg){currentAiMsg.innerHTML=escapeHtml(data.content||streamBuffer);isStreaming=false;currentAiMsg=null;streamBuffer='';}
else{addMsg(escapeHtml(data.content||''),'ai');}
chatBody.scrollTop=chatBody.scrollHeight;break;
case'tool_call':
addMsg('🔧 调用工具: <strong>'+escapeHtml(data.tool||'?')+'</strong>','tool-call');break;
case'tool_result':
addMsg('✅ 工具结果: '+escapeHtml((data.result||'').slice(0,120)),'tool-call');break;
case'error':
if(isStreaming)finalizeStream();addMsg('❌ '+escapeHtml(data.content||'未知错误'),'ai');break;
default:
if(data.type==='stream'&&data.delta){
if(!isStreaming){currentAiMsg=addMsg('','ai');streamBuffer='';isStreaming=true;}
streamBuffer+=data.delta;currentAiMsg.innerHTML=escapeHtml(streamBuffer)+'<span class="stream-cursor"></span>';
chatBody.scrollTop=chatBody.scrollHeight;
}else if(data.type==='reply'&&data.content){
if(isStreaming)finalizeStream();addMsg(escapeHtml(data.content),'ai');chatBody.scrollTop=chatBody.scrollHeight;
}else if(data.reply){
if(isStreaming)finalizeStream();addMsg(escapeHtml(data.reply),'ai');chatBody.scrollTop=chatBody.scrollHeight;
}
break;
}};
}
function scheduleReconnect(){if(reconnectTimer)return;reconnectTimer=setTimeout(function(){reconnectTimer=null;connectWS();},3000);}
function sendMessage(t){
if(!t.trim()||!ws||ws.readyState!==WebSocket.OPEN)return;
if(isStreaming)finalizeStream();addMsg(escapeHtml(t),'user');
ws.send(JSON.stringify({content:t}));chatInput.value='';chatInput.focus();
}
function openDialog(){if(dialogOpen)return;dialogOpen=true;dialog.classList.add('open');chatInput.focus();}
function closeDialog(){if(!dialogOpen)return;dialogOpen=false;dialog.classList.remove('open');}
pet.addEventListener('click',function(){if(!dialogOpen)openDialog();else closeDialog();});
closeBtn.addEventListener('click',function(e){e.stopPropagation();closeDialog();});
sendBtn.addEventListener('click',function(){var t=chatInput.value;if(t.trim())sendMessage(t);});
chatInput.addEventListener('keydown',function(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();var t=chatInput.value;if(t.trim())sendMessage(t);}});
(function(){
var dragTarget=null,ox=0,oy=0;
function start(e,t){
dragTarget=t;var r=t.getBoundingClientRect();
var te=e.touches?e.touches[0]:e;ox=te.clientX-r.left;oy=te.clientY-r.top;e.preventDefault();
}
function move(e){
if(!dragTarget)return;var te=e.touches?e.touches[0]:e;
var x=te.clientX-ox,y=te.clientY-oy;
x=Math.max(0,Math.min(window.innerWidth-dragTarget.offsetWidth,x));
y=Math.max(0,Math.min(window.innerHeight-dragTarget.offsetHeight,y));
dragTarget.style.left=x+'px';dragTarget.style.right='auto';
dragTarget.style.top=y+'px';dragTarget.style.bottom='auto';
}
function end(){dragTarget=null;}
pet.addEventListener('mousedown',function(e){start(e,pet);});
pet.addEventListener('touchstart',function(e){start(e,pet);},{passive:false});
header.addEventListener('mousedown',function(e){start(e,dialog);});
header.addEventListener('touchstart',function(e){start(e,dialog);},{passive:false});
document.addEventListener('mousemove',move);
document.addEventListener('touchmove',move,{passive:false});
document.addEventListener('mouseup',end);
document.addEventListener('touchend',end);
})();
connectWS();
})();
</script>
</body>
</html>
